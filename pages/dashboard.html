<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigal Health | Dashboard</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/dashboard.css">
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="../Sigal-KS-Logo.webp" alt="Sigal Logo">
        </div>
        <nav class="sidebar-nav">
            <a href="#" class="nav-item active">📊 Dashboard</a>
            <a href="kontratat.html" class="nav-item">📄 Kontratat</a>
            <a href="faturimi.html" class="nav-item">🧾 Faturimi</a>
            <a href="#" class="nav-item">🔄 Rinovimet</a>
            <a href="#" class="nav-item">💰 Debitorët</a>
            <a href="#" class="nav-item">📈 Raportet</a>
            <a href="#" class="nav-item">✅ Detyrat</a>
            <a href="#" class="nav-item">📁 Dokumentet</a>
            <a href="#" class="nav-item">👥 Stafi</a>
        </nav>
        <div class="sidebar-footer">
            <a href="../index.html" class="nav-item logout">🚪 Logout</a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="topbar">
            <h1>Dashboard</h1>
            <div class="user-info">
                <span>👤 Admin</span>
            </div>
        </div>

        <!-- Stats Cards -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">📄</div>
                <div class="stat-info">
                    <h3>Kontratat Aktive</h3>
                    <p class="stat-number">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-info">
                    <h3>Të Siguruarit</h3>
                    <p class="stat-number">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🔄</div>
                <div class="stat-info">
                    <h3>Rinovimet Pending</h3>
                    <p class="stat-number">0</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">💰</div>
                <div class="stat-info">
                    <h3>Debitorët</h3>
                    <p class="stat-number">0</p>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
