<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigal Health | Kontratat</title>
    <link rel="stylesheet" href="../css/theme.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-logo">
            <img src="../Sigal-KS-Logo.webp" alt="Sigal Logo">
            <div class="logo-text">
                <span class="logo-text-main">SIGAL</span>
                <span class="logo-text-sub">Insurance Group</span>
            </div>
        </div>
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <span class="nav-icon"><i data-lucide="layout-dashboard"></i></span>
                <span class="nav-label">Dashboard</span>
            </a>
            <a href="oferta.html" class="nav-item">
                <span class="nav-icon"><i data-lucide="clipboard-list"></i></span>
                <span class="nav-label">Oferta</span>
            </a>
            <a href="kontratat.html" class="nav-item active">
                <span class="nav-icon"><i data-lucide="file-text"></i></span>
                <span class="nav-label">Kontratat</span>
            </a>
            <a href="faturimi.html" class="nav-item">
                <span class="nav-icon"><i data-lucide="receipt"></i></span>
                <span class="nav-label">Faturimi</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon"><i data-lucide="refresh-cw"></i></span>
                <span class="nav-label">Rinovimet</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon"><i data-lucide="wallet"></i></span>
                <span class="nav-label">Debitorët</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon"><i data-lucide="bar-chart-3"></i></span>
                <span class="nav-label">Raportet</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon"><i data-lucide="check-circle"></i></span>
                <span class="nav-label">Detyrat</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon"><i data-lucide="folder-open"></i></span>
                <span class="nav-label">Dokumentet</span>
            </a>
            <a href="#" class="nav-item">
                <span class="nav-icon"><i data-lucide="users"></i></span>
                <span class="nav-label">Stafi</span>
            </a>
        </nav>
        <div class="sidebar-footer">
            <a href="../index.html" class="nav-item logout">
                <span class="nav-icon"><i data-lucide="log-out"></i></span>
                <span class="nav-label">Dilni</span>
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="topbar">
            <h1>Kontratat</h1>
            <button class="btn-primary" onclick="shtoKontrate()">
                <i data-lucide="plus" style="width:15px;height:15px;"></i> Kontratë e Re
            </button>
        </div>

        <div class="content-area">
            <div class="filter-bar">
                <select id="filter-lloji" onchange="filtro()">
                    <option value="all">Të gjitha llojet</option>
                    <option value="individ">Individ</option>
                    <option value="biznes">Biznes</option>
                    <option value="familje">Familje</option>
                </select>
                <select id="filter-statusi" onchange="filtro()">
                    <option value="all">Të gjitha statuset</option>
                    <option value="aktive">Aktive</option>
                    <option value="skaduar">Skaduar</option>
                    <option value="ne-pritje">Në Pritje</option>
                </select>
                <input type="text" id="search-kontrate" placeholder="Kërko kontratë..." onkeyup="filtro()">
            </div>

            <div class="stats-container">
                <div class="stats-row">
                    <div class="fstat-card small aktive-card">
                        <span id="count-aktive">0</span>
                        <p>Aktive</p>
                    </div>
                    <div class="fstat-card small skadon-card">
                        <span id="count-skadon">0</span>
                        <p>Skadon së shpejti</p>
                    </div>
                    <div class="fstat-card small skaduar-card">
                        <span id="count-skaduar">0</span>
                        <p>Skaduar</p>
                    </div>
                    <div class="fstat-card big total-card">
                        <span id="count-total">0</span>
                        <p>Total</p>
                    </div>
                </div>
                <div class="stats-row">
                    <div class="fstat-card small individ-card">
                        <span id="count-individ">0</span>
                        <p>Individ</p>
                    </div>
                    <div class="fstat-card small familje-card">
                        <span id="count-familje">0</span>
                        <p>Familje</p>
                    </div>
                    <div class="fstat-card small biznes-card">
                        <span id="count-biznes">0</span>
                        <p>Biznese</p>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Klienti</th>
                            <th>Lloji</th>
                            <th>Pakot</th>
                            <th>Fillimi</th>
                            <th>Mbarimi</th>
                            <th>Skadon</th>
                            <th>Statusi</th>
                            <th>Veprimet</th>
                        </tr>
                    </thead>
                    <tbody id="kontratat-tbody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="mbyllModal()">
        <div class="modal modal-large" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modal-title">Kontratë e Re</h2>
                <button onclick="mbyllModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="lloji-selector">
                    <button class="lloji-btn active" onclick="zgjidhLlojin('individ', this)">Individ</button>
                    <button class="lloji-btn" onclick="zgjidhLlojin('biznes', this)">Biznes</button>
                    <button class="lloji-btn" onclick="zgjidhLlojin('familje', this)">Familje</button>
                </div>
                <input type="hidden" id="m-lloji" value="individ">
                <div class="form-grid">
                    <div class="form-group" style="grid-column: 1 / -1">
                        <label>Emri i Klientit</label>
                        <input type="text" id="m-emri" placeholder="Emri Mbiemri / Kompania">
                    </div>
                    <div class="form-group">
                        <label>Adresa</label>
                        <input type="text" id="m-adresa" placeholder="Rruga, Qyteti">
                    </div>
                    <div class="form-group" id="field-nr-biznesit" style="display:none">
                        <label>Numri i Biznesit</label>
                        <input type="text" id="m-nr-biznesit" placeholder="NIPT/Nr. Fiskal">
                    </div>
                    <div class="form-group" id="field-perfaqesuesi" style="display:none">
                        <label>Përfaqësuesi</label>
                        <input type="text" id="m-perfaqesuesi" placeholder="Emri i përfaqësuesit">
                    </div>
                    <div class="form-group" id="field-nr-personal">
                        <label>Numri Personal</label>
                        <input type="text" id="m-nr-personal" placeholder="Nr. Personal">
                    </div>
                    <div class="form-group" id="field-pozita" style="display:none">
                        <label>Pozita</label>
                        <input type="text" id="m-pozita" placeholder="Pozita">
                    </div>
                    <div class="form-group">
                        <label>Data e Kontratës</label>
                        <input type="date" id="m-data-kontrates">
                    </div>
                    <div class="form-group">
                        <label>Data Fillimit</label>
                        <input type="date" id="m-fillimi">
                    </div>
                    <div class="form-group">
                        <label>Data Mbarimit</label>
                        <input type="date" id="m-mbarimi">
                    </div>
                    <div class="form-group" style="grid-column: 1 / -1">
                        <label>Pakot e Zgjedhura</label>
                        <div class="pakot-grid">
                            <label class="pako-check"><input type="checkbox" value="Pako Bazë"> Pako Bazë</label>
                            <label class="pako-check"><input type="checkbox" value="Pako Standard"> Pako Standard</label>
                            <label class="pako-check"><input type="checkbox" value="Pako Standard Plus"> Pako Standard Plus</label>
                            <label class="pako-check"><input type="checkbox" value="Pako Premium"> Pako Premium</label>
                            <label class="pako-check"><input type="checkbox" value="Pako Silver"> Pako Silver</label>
                            <label class="pako-check"><input type="checkbox" value="Pako Gold"> Pako Gold</label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="mbyllModal()">Anulo</button>
                <button class="btn-primary" onclick="ruajKontrate()">Ruaj</button>
            </div>
        </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/kontratat.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
